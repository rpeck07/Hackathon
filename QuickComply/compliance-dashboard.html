<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<title>Compliance Dashboard — QuickComply</title>

<style>
:root {
  --bg:#0f1117; --bg2:#13151e; --surface:#181c27; --surface2:#1e2233; --surface3:#252a3d;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11); --border3:rgba(255,255,255,0.18);
  --text:#f0f1f5; --text2:#9ea3b5; --text3:#5c6180;
  --accent:#d4b896; --accent2:rgba(212,184,150,0.12); --accent3:rgba(212,184,150,0.06);
  --emerald:#34d399; --emerald-bg:rgba(52,211,153,0.08); --emerald-border:rgba(52,211,153,0.2);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.08); --amber-border:rgba(245,158,11,0.2);
  --rose:#f43f5e; --rose-bg:rgba(244,63,94,0.07); --rose-border:rgba(244,63,94,0.18);
  --sky:#38bdf8; --sky-bg:rgba(56,189,248,0.08); --sky-border:rgba(56,189,248,0.2);
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.4),0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:17px;color:var(--accent);letter-spacing:0.01em;}
.logo em{font-style:normal;font-size:11px;color:var(--text3);font-family:'Geist',sans-serif;margin-left:8px;font-weight:300;letter-spacing:0.06em;text-transform:uppercase;}
.role-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:0.04em;text-transform:uppercase;}
.role-co{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border);}
.role-fa{background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border);}

.wrap{max-width:920px;margin:0 auto;padding:28px 24px;}

.view-toggle{display:flex;gap:4px;margin-bottom:24px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm);width:fit-content;border:1px solid var(--border);}
.vtab{padding:7px 20px;border-radius:var(--radius-sm);border:none;background:none;color:var(--text3);font-size:12px;cursor:pointer;transition:all .18s;font-weight:400;letter-spacing:0.02em;}
.vtab.active{background:var(--surface3);color:var(--text);font-weight:500;box-shadow:var(--shadow);}
.vtab:hover:not(.active){color:var(--text2);}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .15s;}
.stat-card:hover{border-color:var(--border2);}
.stat-num{font-family:'Playfair Display',Georgia,serif;font-size:28px;font-weight:400;margin-bottom:3px;line-height:1;}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}

.review-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.review-card:hover{border-color:var(--border2);}
.rc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .15s;}
.rc-header:hover{background:rgba(255,255,255,.02);}
.rc-left{display:flex;align-items:center;gap:12px;}
.rc-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.rc-name{font-size:13px;font-weight:500;letter-spacing:-0.01em;}
.rc-role{font-size:11px;color:var(--text3);}
.status-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-family:'Geist Mono',monospace;font-weight:500;letter-spacing:0.03em;}
.sp-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.sp-approved{background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border);}
.sp-rejected{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border);}
.sp-revised{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border);}
.sp-sent{background:var(--accent2);color:var(--accent);border:1px solid rgba(212,184,150,.25);}

.rc-body{padding:18px;display:none;border-top:1px solid var(--border);}
.rc-body.open{display:block;}

.email-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;}
.ep-subject{font-size:13px;font-weight:500;margin-bottom:4px;letter-spacing:-0.01em;}
.ep-meta{font-size:10px;color:var(--text3);margin-bottom:10px;font-family:'Geist Mono',monospace;letter-spacing:0.02em;}
.ep-body{font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap;}

.state-regs-mini{padding:8px 12px;background:var(--sky-bg);border:1px solid var(--sky-border);border-radius:var(--radius-sm);font-size:11px;color:var(--sky);margin-bottom:12px;}

.action-section{border-top:1px solid var(--border);padding-top:14px;margin-top:4px;}
.action-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.action-btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);letter-spacing:0.02em;}
.btn-approve{background:var(--emerald);color:#0d0f12;border-color:var(--emerald);font-weight:600;}
.btn-approve:hover{opacity:.88;}
.btn-reject{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-border);}
.btn-reject:hover{background:rgba(244,63,94,.16);}
.btn-send{background:var(--accent);color:#0d0f12;border-color:var(--accent);font-weight:600;}
.btn-send:hover{opacity:.88;}
.btn-secondary{background:none;color:var(--text3);}
.btn-secondary:hover{color:var(--text);background:var(--surface2);}
.btn-resend{background:var(--sky-bg);color:var(--sky);border-color:var(--sky-border);}
.btn-resend:hover{background:rgba(56,189,248,.16);}

.reject-form{margin-top:12px;width:100%;}
.reject-textarea{width:100%;background:var(--surface2);border:1px solid var(--rose-border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:12px;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;line-height:1.6;}
.reject-textarea:focus{border-color:var(--rose);}
.reject-submit{margin-top:8px;padding:8px 16px;background:var(--rose);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.reject-submit:hover{opacity:.88;}

.rejection-note{padding:10px 14px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:var(--radius-sm);font-size:12px;color:rgba(244,63,94,.85);margin-bottom:14px;line-height:1.6;}
.rejection-note strong{color:var(--rose);display:block;margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;}
.approved-note{padding:10px 14px;background:var(--emerald-bg);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);font-size:12px;color:rgba(52,211,153,.85);margin-bottom:14px;}

.revision-section{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:14px;}
.revision-section label{display:block;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.revision-section textarea,.revision-section input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s;}
.revision-section textarea{min-height:160px;resize:vertical;line-height:1.65;}
.revision-section textarea:focus,.revision-section input:focus{border-color:rgba(212,184,150,.4);}

.send-direct-form{padding:14px 16px;background:var(--emerald-bg);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);margin-bottom:14px;}
.send-direct-form label{display:block;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--emerald);margin-bottom:5px;}
.send-direct-form input{width:100%;background:var(--surface);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px;outline:none;}

.empty-state{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-state h3{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:400;color:var(--text);margin-bottom:8px;}
.timestamp{font-size:10px;font-family:'Geist Mono',monospace;color:var(--text3);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.review-card{animation:fadeUp .25s ease both;}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">QuickComply <em>— compliance review</em></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="role-badge role-co">Compliance Officer</div>
    <a href="advisor-inbox.html" style="padding:6px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text3);font-size:11px;cursor:pointer;text-decoration:none;transition:all .15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text3)'">Advisor inbox →</a>
    <button onclick="clearAll()" style="padding:6px 12px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;">Clear all</button>
  </div>
</nav>

<div class="wrap">
  <div class="stats" id="stats-row">
    <div class="stat-card"><div class="stat-num" id="s-total" style="color:var(--text)">0</div><div class="stat-label">Total reviews</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pending" style="color:var(--yellow)">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="s-approved" style="color:var(--green)">0</div><div class="stat-label">Approved</div></div>
    <div class="stat-card"><div class="stat-num" id="s-rejected" style="color:var(--red)">0</div><div class="stat-label">Rejected</div></div>
  </div>



  <div id="reviews-wrap"></div>
</div>

<script>
const COLORS = ['#7c3aed','#0284c7','#059669','#d97706','#db2777','#ea580c'];
function avatarColor(i){return COLORS[i%COLORS.length];}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(iso){
  const d=Date.now()-new Date(iso).getTime();
  if(d<60000)return 'just now';
  if(d<3600000)return Math.floor(d/60000)+'m ago';
  if(d<86400000)return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}

const currentView = 'co';



function getReviews() {
  try { return JSON.parse(localStorage.getItem('cp_pending_reviews') || '[]'); }
  catch(e) { return []; }
}

function saveReviews(arr) {
  localStorage.setItem('cp_pending_reviews', JSON.stringify(arr));
}

function updateStats(reviews) {
  document.getElementById('s-total').textContent = reviews.length;
  document.getElementById('s-pending').textContent = reviews.filter(r=>r.status==='pending'||r.status==='revised').length;
  document.getElementById('s-approved').textContent = reviews.filter(r=>r.status==='approved'||r.status==='sent').length;
  document.getElementById('s-rejected').textContent = reviews.filter(r=>r.status==='rejected').length;
}

function toggleCard(id) {
  const body = document.getElementById('rcb-'+id);
  if(body) body.classList.toggle('open');
}

// ── COMPLIANCE OFFICER ACTIONS ────────────────────────────────────────────────
function approveReview(idx) {
  const reviews = getReviews();
  reviews[idx].status = 'approved';
  reviews[idx].approvedAt = new Date().toISOString();
  saveReviews(reviews);
  render();
}

function showRejectForm(idx) {
  const form = document.getElementById('reject-form-'+idx);
  if(form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

function submitRejection(idx) {
  const reason = document.getElementById('reject-reason-'+idx)?.value?.trim();
  if (!reason) return alert('Please provide a reason for rejection.');
  const reviews = getReviews();
  reviews[idx].status = 'rejected';
  reviews[idx].rejectionReason = reason;
  reviews[idx].rejectedAt = new Date().toISOString();
  saveReviews(reviews);

  render();
}

// ── FINANCIAL ADVISOR ACTIONS ─────────────────────────────────────────────────
function saveRevision(idx) {
  const reviews = getReviews();
  const newSubj = document.getElementById('rev-subj-'+idx)?.value;
  const newBody = document.getElementById('rev-body-'+idx)?.value;
  if (newSubj) reviews[idx].subject = newSubj;
  if (newBody) reviews[idx].body = newBody;
  reviews[idx].status = 'revised';
  reviews[idx].revisedAt = new Date().toISOString();
  saveReviews(reviews);

  // Re-open Gmail to send revised version to compliance
  const r = reviews[idx];
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=jadiengunnip@gmail.com&su=${encodeURIComponent(`[REVISED] ${r.subject}`)}&body=${encodeURIComponent(`REVISED COMPLIANCE REVIEW REQUEST\n\nProspect: ${r.prospectName}\nPrevious rejection reason: ${r.rejectionReason||'N/A'}\n\nREVISED EMAIL:\nSubject: ${r.subject}\n\n${r.body}\n\nPlease review and approve/reject.`)}&from=ryancp207@gmail.com`;
  window.open(gmailUrl, '_blank');
  render();
}

function sendDirectEmail(idx) {
  const reviews = getReviews();
  const r = reviews[idx];
  const toEmail = document.getElementById('direct-to-'+idx)?.value || '';
  if (!toEmail) return alert('Enter prospect email address.');

  // Open Gmail to send directly to prospect
  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(toEmail)}&su=${encodeURIComponent(r.subject)}&body=${encodeURIComponent(r.body)}&from=ryancp207@gmail.com`;
  window.open(gmailUrl, '_blank');

  reviews[idx].status = 'sent';
  reviews[idx].sentToProspect = toEmail;
  reviews[idx].sentToProspectAt = new Date().toISOString();
  saveReviews(reviews);
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const reviews = getReviews();
  updateStats(reviews);
  const wrap = document.getElementById('reviews-wrap');

  if (!reviews.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px;opacity:.3">⚖</div>
      <h3>No reviews yet</h3>
      <p>Send emails for compliance review from the research pipeline and they'll appear here.</p>
    </div>`;
    return;
  }

  // Filter by view
  const filtered = currentView === 'co'
    ? reviews // CO sees everything
    : reviews; // FA sees everything too but with different actions

  wrap.innerHTML = filtered.map((r, idx) => {
    const statusClass = {pending:'sp-pending',approved:'sp-approved',rejected:'sp-rejected',revised:'sp-revised',sent:'sp-sent'}[r.status]||'sp-pending';
    const statusLabel = {pending:'Pending review',approved:'Approved',rejected:'Rejected',revised:'Revised — awaiting review',sent:'Sent to prospect'}[r.status]||r.status;
    const color = COLORS[idx % COLORS.length];
    const compItems = r.complianceItems || [];

    // CO view actions
    const coActions = currentView === 'co' ? `
      <div class="action-section">
        ${r.status === 'pending' || r.status === 'revised' ? `
          <div class="action-row">
            <button class="action-btn btn-approve" onclick="approveReview(${idx})">✓ Approve & notify advisor</button>
            <button class="action-btn btn-reject" onclick="showRejectForm(${idx})">✕ Reject</button>
          </div>
          <div id="reject-form-${idx}" class="reject-form" style="display:none">
            <textarea class="reject-textarea" id="reject-reason-${idx}" placeholder="Explain why this email needs revision (specific rule citations encouraged)..."></textarea>
            <button class="reject-submit" onclick="submitRejection(${idx})">Send rejection to advisor</button>
          </div>
        ` : r.status === 'approved' ? `
          <div class="approved-note">✓ Approved ${r.approvedAt ? '— ' + timeAgo(r.approvedAt) : ''}</div>
        ` : r.status === 'sent' ? `
          <div class="approved-note">✓ Sent to prospect ${r.sentToProspect || ''} ${r.sentToProspectAt ? '— ' + timeAgo(r.sentToProspectAt) : ''}</div>
        ` : `
          <div class="rejection-note"><strong>Rejected</strong>${r.rejectionReason || ''}</div>
        `}
      </div>` : '';

    const faActions = '';

    return `<div class="review-card">
      <div class="rc-header" onclick="toggleCard(${idx})">
        <div class="rc-left">
          <div class="rc-avatar" style="background:${color}22;color:${color};overflow:hidden;position:relative">
        ${r.prospectImg ? `<img src="${r.prospectImg}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" onerror="this.remove()">` : ''}
        <span style="position:relative;z-index:1">${initials(r.prospectName||'?')}</span>
      </div>
          <div>
            <div class="rc-name">${esc(r.prospectName||'Unknown')}</div>
            <div class="rc-role">${esc(r.prospectRole||'')} <span class="timestamp">· Submitted ${timeAgo(r.sentAt)}</span></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${r.complianceScore ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:${r.complianceScore>=90?'var(--green)':r.complianceScore>=70?'var(--yellow)':'var(--red)'}">${r.complianceScore}/100</span>` : ''}
          <span class="status-pill ${statusClass}">${statusLabel}</span>
          <span style="color:var(--muted);font-size:12px">▾</span>
        </div>
      </div>
      <div class="rc-body" id="rcb-${idx}">
        ${r.stateRegs ? `<div class="state-regs-mini">📍 State regs: ${esc(r.stateRegs)}</div>` : ''}
        <div class="email-preview">
          <div class="ep-subject">${esc(r.subject||'')}</div>
          <div class="ep-meta">To: ${esc(r.prospectName)} · From: ryancp207@gmail.com</div>
          <div class="ep-body">${esc(r.body||'')}</div>
        </div>
        ${coActions}
        ${faActions}
      </div>
    </div>`;
  }).join('');
}

function clearAll() {
  if (confirm('Clear all reviews? This cannot be undone.')) {
    localStorage.removeItem('cp_pending_reviews');
    render();
  }
}

// Auto-refresh every 10 seconds
setInterval(render, 10000);

// Boot
render();
</script>
</body>
</html>
