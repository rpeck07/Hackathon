<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<title>Advisor Inbox — QuickComply</title>
<style>
:root {
  --bg:#0f1117; --bg2:#13151e; --surface:#181c27; --surface2:#1e2233; --surface3:#252a3d;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11); --border3:rgba(255,255,255,0.18);
  --text:#f0f1f5; --text2:#9ea3b5; --text3:#5c6180;
  --accent:#d4b896; --accent2:rgba(212,184,150,0.12); --accent3:rgba(212,184,150,0.06);
  --emerald:#34d399; --emerald-bg:rgba(52,211,153,0.08); --emerald-border:rgba(52,211,153,0.2);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.08); --amber-border:rgba(245,158,11,0.2);
  --rose:#f43f5e; --rose-bg:rgba(244,63,94,0.07); --rose-border:rgba(244,63,94,0.18);
  --sky:#38bdf8; --sky-bg:rgba(56,189,248,0.08); --sky-border:rgba(56,189,248,0.2);
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.4),0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

.topnav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
.logo{font-family:'Playfair Display',Georgia,serif;font-size:17px;color:var(--accent);letter-spacing:0.01em;}
.logo em{font-style:normal;font-size:11px;color:var(--text3);font-family:'Geist',sans-serif;margin-left:8px;font-weight:300;letter-spacing:0.06em;text-transform:uppercase;}
.nav-right{display:flex;gap:8px;align-items:center;}
.nav-link{padding:6px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text3);font-size:11px;cursor:pointer;text-decoration:none;transition:all .15s;display:inline-block;}
.nav-link:hover{color:var(--text);border-color:var(--border3);}
.fa-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:0.04em;text-transform:uppercase;background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border);}

.wrap{max-width:920px;margin:0 auto;padding:28px 24px;}

.page-header{margin-bottom:28px;}
.page-title{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:400;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em;}
.page-sub{color:var(--text3);font-size:13px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.stat-num{font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:400;margin-bottom:3px;line-height:1;}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;}

/* FILTER TABS */
.filter-row{display:flex;gap:4px;margin-bottom:20px;}
.ftab{padding:6px 14px;border-radius:20px;border:1px solid transparent;font-size:11px;cursor:pointer;background:none;color:var(--text3);letter-spacing:0.03em;text-transform:uppercase;transition:all .15s;}
.ftab:hover{color:var(--text2);background:var(--surface2);}
.ftab.fa{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.ftab.fr{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-border);}
.ftab.fg{background:var(--emerald-bg);color:var(--emerald);border-color:var(--emerald-border);}
.ftab.fp{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);}
.ftab.fs{background:var(--accent2);color:var(--accent);border-color:rgba(212,184,150,.25);}

/* INBOX ITEM */
.inbox-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.inbox-item:hover{border-color:var(--border2);}
.inbox-item.rejected{border-left:3px solid var(--rose);}
.inbox-item.approved{border-left:3px solid var(--emerald);}
.inbox-item.pending{border-left:3px solid var(--amber);}
.inbox-item.revised{border-left:3px solid var(--sky);}
.inbox-item.sent{border-left:3px solid var(--accent);}

.item-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .15s;}
.item-header:hover{background:rgba(255,255,255,.02);}
.item-left{display:flex;align-items:center;gap:12px;}
.item-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.item-name{font-size:13px;font-weight:500;letter-spacing:-0.01em;}
.item-subject{font-size:11px;color:var(--text3);margin-top:1px;}
.status-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-family:'Geist Mono',monospace;font-weight:500;letter-spacing:0.03em;}
.sp-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.sp-approved{background:var(--emerald-bg);color:var(--emerald);border:1px solid var(--emerald-border);}
.sp-rejected{background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border);}
.sp-revised{background:var(--sky-bg);color:var(--sky);border:1px solid var(--sky-border);}
.sp-sent{background:var(--accent2);color:var(--accent);border:1px solid rgba(212,184,150,.25);}

.item-body{padding:18px;border-top:1px solid var(--border);display:none;}
.item-body.open{display:block;}

/* REJECTION BANNER */
.rejection-banner{padding:14px 16px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:var(--radius-sm);margin-bottom:16px;}
.rejection-banner .rj-title{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--rose);font-family:'Geist Mono',monospace;margin-bottom:6px;}
.rejection-banner .rj-reason{font-size:13px;color:var(--text2);line-height:1.6;}

/* APPROVAL BANNER */
.approval-banner{padding:12px 16px;background:var(--emerald-bg);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);margin-bottom:16px;font-size:12px;color:rgba(52,211,153,.9);}

/* EMAIL EDITOR */
.email-section{margin-bottom:16px;}
.email-section label{display:block;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.email-section input,.email-section textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;}
.email-section textarea{min-height:180px;resize:vertical;line-height:1.7;}
.email-section input:focus,.email-section textarea:focus{border-color:rgba(212,184,150,.4);}
.email-section input[readonly],.email-section textarea[readonly]{opacity:.6;cursor:default;}

/* SEND FORM */
.send-section{background:var(--emerald-bg);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;}
.send-section label{display:block;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.07em;text-transform:uppercase;color:var(--emerald);margin-bottom:6px;}
.send-section input{width:100%;background:var(--surface);border:1px solid var(--emerald-border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:12px;outline:none;}

/* ACTION ROW */
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.abtn{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border2);letter-spacing:0.02em;}
.abtn-primary{background:var(--accent);color:#0d0f12;border-color:var(--accent);font-weight:600;}
.abtn-primary:hover{opacity:.88;}
.abtn-danger{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-border);}
.abtn-danger:hover{background:rgba(244,63,94,.16);}
.abtn-sky{background:var(--sky-bg);color:var(--sky);border-color:var(--sky-border);}
.abtn-sky:hover{background:rgba(56,189,248,.16);}
.abtn-secondary{background:none;color:var(--text3);}
.abtn-secondary:hover{color:var(--text);background:var(--surface2);}
.abtn-send{background:var(--emerald);color:#0d0f12;border-color:var(--emerald);font-weight:600;}
.abtn-send:hover{opacity:.88;}

.sent-banner{padding:12px 16px;background:var(--accent2);border:1px solid rgba(212,184,150,.25);border-radius:var(--radius-sm);font-size:12px;color:var(--accent);margin-bottom:14px;}

/* EMPTY */
.empty-state{text-align:center;padding:80px 20px;color:var(--text3);}
.empty-state h3{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:400;color:var(--text);margin-bottom:8px;}

.timestamp{font-size:10px;font-family:'Geist Mono',monospace;color:var(--text3);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.inbox-item{animation:fadeUp .2s ease both;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('KF_t_flwCxoCer2S5');</script>
</head>
<body>

<nav class="topnav">
  <div class="logo">QuickComply <em>— advisor inbox</em></div>
  <div class="nav-right">
    <div class="fa-badge">Financial Advisor</div>
    <a href="index.html" class="nav-link">← Triage</a>
    <a href="compliance-dashboard.html" class="nav-link">Compliance dashboard</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-title">Your inbox</div>
    <div class="page-sub">Compliance decisions, revisions, and approved sends — all in one place.</div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="s-total" style="color:var(--text)">0</div><div class="stat-label">Total submitted</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pending" style="color:var(--amber)">0</div><div class="stat-label">Awaiting review</div></div>
    <div class="stat-card"><div class="stat-num" id="s-rejected" style="color:var(--rose)">0</div><div class="stat-label">Needs revision</div></div>
    <div class="stat-card"><div class="stat-num" id="s-approved" style="color:var(--emerald)">0</div><div class="stat-label">Ready to send</div></div>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="ftab fa" onclick="setFilter('all',this)">All</button>
    <button class="ftab fr" onclick="setFilter('rejected',this)">Needs revision</button>
    <button class="ftab fg" onclick="setFilter('approved',this)">Ready to send</button>
    <button class="ftab fp" onclick="setFilter('pending',this)">Pending</button>
    <button class="ftab fs" onclick="setFilter('sent',this)">Sent</button>
  </div>

  <div id="inbox-wrap"></div>
</div>

<script>
const COLORS = ['#7c3aed','#0284c7','#059669','#d97706','#db2777','#ea580c'];
function avatarColor(i){return COLORS[i%COLORS.length];}
function initials(n){return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(iso){
  if(!iso) return '';
  const d=Date.now()-new Date(iso).getTime();
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}

let currentFilter = 'all';

function getReviews(){
  try{return JSON.parse(localStorage.getItem('cp_pending_reviews')||'[]');}catch(e){return[];}
}
function saveReviews(arr){localStorage.setItem('cp_pending_reviews',JSON.stringify(arr));}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.className='ftab');
  const clsMap={all:'fa',rejected:'fr',approved:'fg',pending:'fp',revised:'fp',sent:'fs'};
  btn.className = 'ftab ' + (clsMap[f]||'fa');
  render();
}

function toggleItem(idx){
  const body = document.getElementById('ib-'+idx);
  if(body) body.classList.toggle('open');
}

function submitRevision(idx){
  const reviews = getReviews();
  const newSubj = document.getElementById('rs-'+idx)?.value?.trim();
  const newBody = document.getElementById('rb-'+idx)?.value?.trim();
  if(!newSubj||!newBody) return alert('Subject and body are required.');
  reviews[idx].subject = newSubj;
  reviews[idx].body = newBody;
  reviews[idx].status = 'revised';
  reviews[idx].revisedAt = new Date().toISOString();
  saveReviews(reviews);

  const r = reviews[idx];
  render();
}

async function sendToProspect(idx){
  const reviews = getReviews();
  const r = reviews[idx];
  const toEmail = document.getElementById('dt-'+idx)?.value?.trim() || r.prospectEmail || 'jadiengunnip@gmail.com';

  const btn = document.querySelector(`[onclick="sendToProspect(${idx})"]`);
  if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }

  try {
    await emailjs.send('service_zjvkf3m', 'template_quud2b7', {
      to_email: toEmail,
      subject: r.subject,
      message: r.body,
      from_email: 'ryancp207@gmail.com',
      from_name: 'Ryan Peck'
    });

    reviews[idx].status = 'sent';
    reviews[idx].sentToProspect = toEmail;
    reviews[idx].sentToProspectAt = new Date().toISOString();
    saveReviews(reviews);
    render();
  } catch(err) {
    console.error('EmailJS error:', err);
    if (btn) { btn.textContent = '✉ Send email to prospect'; btn.disabled = false; }
    alert('Send failed: ' + (err.text || err.message || JSON.stringify(err)));
  }
}


function render(){
  const reviews = getReviews();

  // Stats
  document.getElementById('s-total').textContent = reviews.length;
  document.getElementById('s-pending').textContent = reviews.filter(r=>r.status==='pending'||r.status==='revised').length;
  document.getElementById('s-rejected').textContent = reviews.filter(r=>r.status==='rejected').length;
  document.getElementById('s-approved').textContent = reviews.filter(r=>r.status==='approved').length;

  const filtered = currentFilter === 'all' ? reviews : reviews.filter(r=>r.status===currentFilter);
  const wrap = document.getElementById('inbox-wrap');

  if(!filtered.length){
    wrap.innerHTML = `<div class="empty-state">
      <div style="font-size:32px;margin-bottom:12px;opacity:.2">✉</div>
      <h3>${currentFilter==='all'?'No emails submitted yet':'Nothing here'}</h3>
      <p style="margin-top:6px">${currentFilter==='all'?'Submit emails for compliance review from the research pipeline.':'Try a different filter.'}</p>
    </div>`;
    return;
  }

  wrap.innerHTML = filtered.map((r, origIdx) => {
    const idx = reviews.indexOf(r);
    const color = COLORS[idx % COLORS.length];
    const statusClass = {pending:'sp-pending',approved:'sp-approved',rejected:'sp-rejected',revised:'sp-revised',sent:'sp-sent'}[r.status]||'sp-pending';
    const statusLabel = {pending:'Awaiting review',approved:'Approved — ready to send',rejected:'Rejected — needs revision',revised:'Revised — awaiting review',sent:'Sent to prospect'}[r.status]||r.status;
    const itemClass = {pending:'pending',approved:'approved',rejected:'rejected',revised:'revised',sent:'sent'}[r.status]||'pending';

    let bodyContent = '';

    if(r.status === 'rejected'){
      bodyContent = `
        <div class="rejection-banner">
          <div class="rj-title">Rejected by compliance officer ${r.rejectedAt?'· '+timeAgo(r.rejectedAt):''}</div>
          <div class="rj-reason">${esc(r.rejectionReason||'No reason provided.')}</div>
        </div>
        <div class="email-section"><label>Revise subject</label>
          <input type="text" id="rs-${idx}" value="${esc(r.subject)}">
        </div>
        <div class="email-section"><label>Revise email body</label>
          <textarea id="rb-${idx}">${esc(r.body)}</textarea>
        </div>
        <div class="action-row">
          <button class="abtn abtn-sky" onclick="submitRevision(${idx})">↻ Resubmit to compliance officer</button>
        </div>`;
    } else if(r.status === 'approved'){
      bodyContent = `
        <div class="approval-banner">✓ Approved by compliance officer${r.approvedAt?' — '+timeAgo(r.approvedAt):''}</div>
        <div class="email-section"><label>Email to send</label>
          <input type="text" readonly value="${esc(r.subject)}">
        </div>
        <div class="email-section">
          <textarea readonly>${esc(r.body)}</textarea>
        </div>
        <div class="send-section">
          <label>Prospect email address</label>
          <input type="email" id="dt-${idx}" placeholder="prospect@email.com" value="${r.prospectEmail||'jadiengunnip@gmail.com'}">
        </div>
        <div class="action-row">
          <button class="abtn abtn-send" onclick="sendToProspect(${idx})">✉ Send via Gmail</button>
        </div>`;
    } else if(r.status === 'sent'){
      bodyContent = `
        <div class="sent-banner">✓ Sent to ${esc(r.sentToProspect||'prospect')} ${r.sentToProspectAt?'— '+timeAgo(r.sentToProspectAt):''}</div>
        <div class="email-section"><label>Email sent</label>
          <input type="text" readonly value="${esc(r.subject)}">
        </div>
        <div class="email-section">
          <textarea readonly>${esc(r.body)}</textarea>
        </div>`;
    } else if(r.status === 'revised'){
      bodyContent = `
        <div style="padding:12px 16px;background:var(--sky-bg);border:1px solid var(--sky-border);border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;color:var(--sky);">
          Revised version submitted — awaiting compliance officer review.
        </div>
        <div class="email-section"><label>Revised subject</label>
          <input type="text" readonly value="${esc(r.subject)}">
        </div>
        <div class="email-section">
          <textarea readonly>${esc(r.body)}</textarea>
        </div>`;
    } else {
      bodyContent = `
        <div style="padding:12px 16px;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;color:var(--amber);">
          Submitted to compliance officer — awaiting review.
        </div>
        <div class="email-section"><label>Submitted email</label>
          <input type="text" readonly value="${esc(r.subject)}">
        </div>
        <div class="email-section">
          <textarea readonly>${esc(r.body)}</textarea>
        </div>`;
    }

    return `<div class="inbox-item ${itemClass}">
      <div class="item-header" onclick="toggleItem(${idx})">
        <div class="item-left">
          <div class="item-avatar" style="background:${color}22;color:${color};overflow:hidden;position:relative">
            ${r.prospectImg ? `<img src="${r.prospectImg}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" onerror="this.remove()">` : ''}
            <span style="position:relative;z-index:1">${initials(r.prospectName)}</span>
          </div>
          <div>
            <div class="item-name">${esc(r.prospectName||'Unknown')}</div>
            <div class="item-subject">${esc(r.subject||'')} <span class="timestamp">· ${timeAgo(r.sentAt)}</span></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${r.complianceScore?`<span style="font-family:'Geist Mono',monospace;font-size:10px;color:${r.complianceScore>=90?'var(--emerald)':r.complianceScore>=70?'var(--amber)':'var(--rose)'}">${r.complianceScore}/100</span>`:''}
          <span class="status-pill ${statusClass}">${statusLabel}</span>
          <span style="color:var(--text3);font-size:11px">▾</span>
        </div>
      </div>
      <div class="item-body" id="ib-${idx}">
        ${r.stateRegs?`<div style="padding:8px 12px;background:var(--sky-bg);border:1px solid var(--sky-border);border-radius:var(--radius-sm);font-size:11px;color:var(--sky);margin-bottom:12px;">📍 ${esc(r.stateRegs)}</div>`:''}
        ${bodyContent}
      </div>
    </div>`;
  }).join('');
}

// Auto-refresh every 8 seconds
setInterval(render, 8000);
render();
</script>
</body>
</html>
